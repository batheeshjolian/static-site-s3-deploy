name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::099771438399:role/github-s3-deploy-role
          aws-region: eu-north-1

      - name: Upload to S3
        run: aws s3 sync . s3://jolian-matala-4-2026 --delete --exclude ".git/*" --exclude ".github/*"